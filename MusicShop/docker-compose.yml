services:
  postgres:
    image: ankane/pgvector:latest 
    container_name: musicshop-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: MusicShopDb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
